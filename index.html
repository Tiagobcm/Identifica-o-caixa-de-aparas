<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Gerador de Etiqueta - Aparas</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f0f0f0;
text-align:center;
}

/* formulário */

.container{
background:white;
padding:20px;
margin:auto;
width:420px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

select,input{
width:90%;
padding:8px;
margin:6px;
font-size:14px;
}

button{
padding:10px 18px;
margin:5px;
cursor:pointer;
font-weight:bold;
}

/* folha A4 */

.folha{

width:210mm;
height:297mm;

background:white;

margin:auto;
margin-top:20px;

display:flex;
align-items:center;
justify-content:center;

}

/* etiqueta */

.etiqueta{

width:70%;
border:3px solid black;

padding:40px;

display:flex;
flex-direction:column;
align-items:center;
gap:25px;

}

/* título */

.titulo{

font-size:34px;
font-weight:bold;
letter-spacing:2px;

}

/* bloco informações */

.info{

width:100%;

display:flex;
justify-content:space-between;

font-size:26px;

}

/* barcode */

.barcode{

margin-top:20px;
width:100%;
display:flex;
justify-content:center;
overflow:hidden;

}

/* impressão limpa */

@media print{

body *{
visibility:hidden;
}

.folha, .folha *{
visibility:visible;
}

.folha{
position:absolute;
left:0;
top:0;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Gerador de Etiqueta</h2>

<select id="maquina"></select>

<select id="unidade">
<option>Unidade 1</option>
<option>Unidade 2</option>
<option>Unidade 3</option>
<option>Unidade 4</option>
<option>Unidade 5</option>
<option>Unidade 6</option>
<option>Unidade TBR1</option>
<option>Unidade TBR2</option>
</select>

<input id="data" type="date">

<br>

<button onclick="gerarEtiqueta()">Gerar Etiqueta</button>
<button onclick="window.print()">Imprimir</button>

</div>


<div class="folha">

<div class="etiqueta">

<div class="titulo">
CAIXA DE APARAS
</div>

<div class="info">
<div><b>Máquina:</b></div>
<div id="rMaquina"></div>
</div>

<div class="info">
<div><b>Unidade:</b></div>
<div id="rUnidade"></div>
</div>

<div class="info">
<div><b>Data:</b></div>
<div id="rData"></div>
</div>

<div class="barcode">
<svg id="barcode"></svg>
</div>

</div>

</div>


<script>

let maquinas = [

"Ply Assembly 1",
"Ply Assembly 2",
"Ply Assembly 3",

"Breaker 1",
"Breaker 2",
"Breaker 3",

"Building 1","Building 2","Building 3","Building 4","Building 5",
"Building 6","Building 7","Building 8","Building 9","Building 10",
"Building 11","Building 12","Building 13","Building 14","Building 15",
"Building 16","Building 17","Building 18","Building 19","Building 20",
"Building 21","Building 22","Building 23","Building 24",

"Building 60T1",
"Building 60T2",
"Building 60T3",
"Building 60T4"

]

function carregarMaquinas(){

let select = document.getElementById("maquina")

maquinas.forEach(m =>{

let option = document.createElement("option")

option.value = m
option.text = m

select.appendChild(option)

})

}

function gerarEtiqueta(){

let maquina = document.getElementById("maquina").value
let unidade = document.getElementById("unidade").value
let data = document.getElementById("data").value

document.getElementById("rMaquina").innerText = maquina
document.getElementById("rUnidade").innerText = unidade
document.getElementById("rData").innerText = data

let codigo = maquina + "-" + unidade + "-" + data

JsBarcode("#barcode", codigo,{
format:"CODE128",
width:1.2,
height:90,
displayValue:true,
fontSize:14,
margin:0
})

}

carregarMaquinas()

</script>

</body>
</html>
